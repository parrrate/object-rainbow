[package]
name = "object-rainbow-schema"
version = "0.0.0-a.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
object-rainbow.workspace = true
object-rainbow-amt = { workspace = true, optional = true }
object-rainbow-hamt = { workspace = true, optional = true }
object-rainbow-point = { workspace = true, optional = true }

[features]
_collections = ["point"]
_collections-map = ["_collections"]
amt = ["dep:object-rainbow-amt", "_collections-map"]
hamt = ["dep:object-rainbow-hamt"]
point = ["dep:object-rainbow-point"]
