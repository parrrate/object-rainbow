[package]
name = "object-rainbow-schema"
version = "0.0.0-a.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "interpretable schema for `object-rainbow`"

[dependencies]
object-rainbow.workspace = true
object-rainbow-amt = { workspace = true, optional = true }
object-rainbow-apply = { workspace = true, optional = true }
object-rainbow-hamt = { workspace = true, optional = true }
object-rainbow-point = { workspace = true, optional = true }

futures-util.workspace = true

[features]
_collections = ["point"]
_collections-item = ["_collections"]
_collections-kv = ["_collections"]
amt = ["dep:object-rainbow-amt", "_collections-item", "_collections-kv"]
apply = ["dep:object-rainbow-apply"]
hamt = ["dep:object-rainbow-hamt", "_collections-item"]
point = ["dep:object-rainbow-point", "object-rainbow-apply/point"]
